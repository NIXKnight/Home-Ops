---
# Application: prometheus (Tier 1 base -- STRUCTURE, public).
#
# helm-direct archetype WITH a third (manifests) source: the env-specific raw CRs
# (the shared observability PriorityClass) live in the private repo at
# argocd/apps/prometheus/environments/<env>/manifests/. The chart version, the
# $values path, and the manifests path are PLACEHOLDERs pinned by the private
# Tier 2 overlay; the private git-source repoURLs are injected there too. The
# cascade finalizer is added by the Tier 3 aggregator.
#
# FOUNDATION of the monitoring namespace. This app is the SOLE owner of the
# `monitoring` namespace metadata (see managedNamespaceMetadata below) -- the
# sibling observability apps (loki/grafana/alloy, wave 4) use plain
# CreateNamespace so no two apps fight over the shared namespace labels. It also
# ships the `observability-critical` PriorityClass every monitoring app consumes,
# which is why it sits one wave ahead of the rest.
#
# Prometheus here is the metrics STORE, not a collector: Alloy (sibling app) is
# the sole scraper and pushes via remote_write. The chart's default scrape jobs
# are stripped in the private values; the remote-write receiver is enabled there.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    # Wave 3: creates the monitoring namespace (privileged PSA) + the
    # observability-critical PriorityClass that the wave-4 siblings reference.
    argocd.argoproj.io/sync-wave: "3"
  labels:
    deploymentStrategy: helm-direct
spec:
  project: infrastructure
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: "0.0.0"          # PLACEHOLDER -- pinned by Tier 2
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/argocd/apps/prometheus/environments/PLACEHOLDER/values.yaml
    # ref-only source: exposes $values from the private config repo (repoURL
    # injected by the private Tier 2 overlay; no render).
    - repoURL: PLACEHOLDER
      targetRevision: main
      ref: values
    # env-specific raw manifests (the observability-critical PriorityClass) from
    # the private config repo (repoURL injected by the private Tier 2 overlay).
    - repoURL: PLACEHOLDER
      targetRevision: main
      path: argocd/apps/prometheus/environments/PLACEHOLDER/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # SOLE OWNER of the monitoring namespace metadata. The node-exporter subchart
    # (DaemonSet) runs hostNetwork + hostPID + hostPath-mounted, which Talos's
    # cluster-wide Pod Security admission BASELINE forbids; the wave-4 alloy-logs
    # sibling (same namespace) needs the same. Label the auto-created namespace
    # enforce=privileged so PSA permits both. Siblings use plain CreateNamespace
    # (no managedNamespaceMetadata) so only THIS app reconciles the label -- two
    # apps managing the same namespace metadata would drift-fight every sync.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply for the large scrape/rule ConfigMap + CSI-free CRD-less
      # chart; parity with the other platform Tier 1s.
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
