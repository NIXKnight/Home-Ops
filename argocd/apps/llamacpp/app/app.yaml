---
# Application: llamacpp (Tier 1 base -- STRUCTURE, public).
#
# helm-direct archetype WITH a third (manifests) source, but source[0] is a NULL
# chart: there is no upstream single-server llama.cpp Helm chart, so the workload is
# raw manifests. source[0] points at the bedag `raw` utility chart, which renders
# NOTHING when given an empty resources list (see the private values.yaml); every
# real object (Deployment, Service, Ingress) lives in the private manifests
# source[2]. This keeps the exact 3-source shape the Tier 2 overlay + Tier 3
# aggregator already know how to patch (identical to zfs-localpv / external-dns),
# with no changes to the shared machinery. The chart version, the $values path, and
# the manifests path are PLACEHOLDERs pinned by the private Tier 2 overlay; the
# private git-source repoURLs are injected there too. The cascade finalizer is added
# by the Tier 3 aggregator. The public repo never names the private config repo.
#
# WORKLOAD: a llama.cpp `llama-server` (OpenAI-compatible /v1 API) on the GPU worker
# node (single RTX 3090, 24 GB, compute 8.6). GGUF weights + the download cache live
# on a node hostPath (LLAMA_CACHE); because a hostPath volume is disallowed under
# the Baseline/Restricted Pod-Security levels, the auto-created llamacpp namespace is
# labeled enforce=privileged via managedNamespaceMetadata below (gpu-operator uses
# the same block for its privileged operands).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llamacpp
  namespace: argocd
  annotations:
    # Wave 3: the workload needs the GPU device-plugin from gpu-operator (wave 1, so
    # nvidia.com/gpu is allocatable) AND working LAN ingress -- traefik +
    # external-dns-private (both wave 2) -- for its Ingress host to resolve and
    # route. Wave 3 is the earliest wave that starts only after those are Healthy.
    # llamacpp does NOT depend on the monitoring stack (waves 3-4, different
    # namespace and node), so it is deliberately not gated behind it.
    argocd.argoproj.io/sync-wave: "3"
  labels:
    deploymentStrategy: helm-direct
spec:
  project: infrastructure
  sources:
    # NULL chart: bedag `raw` renders only what its .Values.resources lists, which
    # the private values.yaml sets to [] -> zero objects. Present solely to hold the
    # 3-source helm-direct shape; all real manifests come from source[2].
    - repoURL: https://bedag.github.io/helm-charts
      chart: raw
      targetRevision: "0.0.0"          # PLACEHOLDER -- pinned by Tier 2
      helm:
        releaseName: llamacpp
        valueFiles:
          - $values/argocd/apps/llamacpp/environments/PLACEHOLDER/values.yaml
    # ref-only source: exposes $values from the private config repo (repoURL
    # injected by the private Tier 2 overlay; no render).
    - repoURL: PLACEHOLDER
      targetRevision: main
      ref: values
    # env-specific raw manifests (the Deployment, Service and Ingress) from the
    # private config repo (repoURL injected by the private Tier 2 overlay).
    - repoURL: PLACEHOLDER
      targetRevision: main
      path: argocd/apps/llamacpp/environments/PLACEHOLDER/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: llamacpp
  syncPolicy:
    # The pod mounts a node hostPath (GGUF + download cache); hostPath is forbidden
    # under PSA Baseline/Restricted, so label the auto-created llamacpp namespace
    # enforce=privileged. Nests under syncPolicy per the ArgoCD v3.4 Application schema.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
