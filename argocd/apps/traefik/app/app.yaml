---
# Application: traefik (Tier 1 base -- STRUCTURE, public).
#
# helm-direct archetype WITH a third (manifests) source: env-specific raw CRs
# (the wildcard Certificate + the default TLSStore) live in the private repo at
# argocd/apps/traefik/environments/<env>/manifests/. The chart version, the
# $values path, and the manifests path are PLACEHOLDERs pinned by the private
# Tier 2 overlay. The cascade finalizer is added by the Tier 3 aggregator.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    deploymentStrategy: helm-direct
spec:
  project: infrastructure
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: "0.0.0"          # PLACEHOLDER -- pinned by Tier 2
      helm:
        releaseName: traefik
        valueFiles:
          - $values/argocd/apps/traefik/environments/PLACEHOLDER/values.yaml
    # ref-only source: exposes $values from the private config repo (repoURL
    # injected by the private Tier 2 overlay; no render).
    - repoURL: PLACEHOLDER
      targetRevision: main
      ref: values
    # env-specific raw manifests (wildcard Certificate + TLSStore) from the
    # private config repo (repoURL injected by the private Tier 2 overlay).
    - repoURL: PLACEHOLDER
      targetRevision: main
      path: argocd/apps/traefik/environments/PLACEHOLDER/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply avoids the client-side last-applied annotation limit on
      # the Traefik CRDs the chart bundles.
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
