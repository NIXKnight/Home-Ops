---
# Export OpenBao init secrets (unseal key shares + root token) from the PostgreSQL
# escrow back into Ansible as inline !vault values.
#
# Run AFTER the unseal sidecar has initialized OpenBao (deploy playbooks/openbao.yml
# first). This play reads the latest vault_init_data row from the data_services
# PostgreSQL, decrypts it server-side with pgp_sym_decrypt (mirroring the daemon's
# read_escrow), and writes OPENBAO_UNSEAL_KEY_1..N + OPENBAO_ROOT_TOKEN into the
# external secrets-openbao.yml as inline !vault ciphertext, inside an ANSIBLE
# MANAGED BLOCK.
#
# SECURITY (binding): the decrypted init JSON, the unseal keys, the root token, the
# pgcrypto encryption key and the ansible-vault password are all handled with
# no_log: true. No plaintext secret is written to disk — values are vaulted in
# memory via the ansible.builtin.vault filter (wrap_object=true) and only the
# resulting ciphertext lands in the file. The filter uses a RANDOM salt (no
# value-seeded salt — that would be an equality oracle), so the managed block is
# rewritten with fresh ciphertext on every run; that re-vault churn is acceptable
# because this play is run-once and on-demand, and the decrypted values are stable.
#
# Requires -i pointing at the external inventory (so inventory_dir resolves to the
# group_vars location), e.g.:
#   ansible-playbook -i ../../Home-Ops-Internal/ansible/inventories playbooks/openbao-export-secrets.yml
- name: Export OpenBao init secrets into Ansible vault
  hosts: data_services
  run_once: true
  gather_facts: false
  become: false
  vars:
    openbao_secrets_file: "{{ inventory_dir }}/group_vars/all/secrets-openbao.yml"
    openbao_vault_password_file: "{{ ansible_config_file | dirname }}/.ansible_vault_password"
  tasks:
    - name: Read the latest escrowed OpenBao init data (decrypt server-side)
      community.postgresql.postgresql_query:
        login_host: "{{ postgresql_login_host }}"
        login_user: "{{ postgresql_login_username }}"
        login_password: "{{ postgresql_login_password }}"
        db: "{{ OPENBAO_PG_DB }}"
        query: >-
          SELECT CASE WHEN is_encrypted
                      THEN pgp_sym_decrypt(encrypted_json, %s)
                      ELSE convert_from(encrypted_json, 'UTF8')
                 END AS init_json
          FROM vault_init_data
          ORDER BY id DESC
          LIMIT 1;
        positional_args:
          - "{{ POSTGRES_ENCRYPTION_KEY }}"
      register: openbao_escrow
      no_log: true

    - name: Fail if OpenBao has not been initialized yet
      ansible.builtin.fail:
        msg: >-
          OpenBao not yet initialized by the unseal sidecar; deploy first
          (ansible-playbook playbooks/openbao.yml) and retry once the node reports
          initialized and unsealed.
      when: (openbao_escrow.query_result | default([]) | length) == 0

    - name: Parse the init JSON
      ansible.builtin.set_fact:
        openbao_init: "{{ openbao_escrow.query_result[0].init_json | from_json }}"
      no_log: true

    - name: Assemble the export item list (prefer base64 unseal keys, like the daemon)
      # Jinja2 has no list comprehensions: build a name->share dict (root token +
      # OPENBAO_UNSEAL_KEY_1..N) and convert it to a [{key,value}] list with dict2items.
      ansible.builtin.set_fact:
        openbao_export_items: >-
          {{ ({'OPENBAO_ROOT_TOKEN': openbao_init.root_token}
              | combine(dict(
                  (range(1, (_keys | length) + 1) | map('string')
                     | map('regex_replace', '^', 'OPENBAO_UNSEAL_KEY_') | list)
                  | zip(_keys)
                ))) | dict2items }}
      vars:
        # Prefer base64 shares like the daemon; ['keys'] (not .keys) reads the dict
        # item, avoiding the built-in dict.keys() method.
        _keys: "{{ openbao_init.keys_base64 | default(openbao_init['keys']) }}"
      no_log: true

    - name: Read the ansible-vault password (controller-side)
      ansible.builtin.set_fact:
        openbao_vault_pw: "{{ lookup('ansible.builtin.file', openbao_vault_password_file) | trim }}"
      no_log: true

    - name: Build the inline !vault export block (random salt; re-vault churn accepted)
      # Format each value as a proper `!vault |` block scalar. `ansible.builtin.vault`
      # WITHOUT wrap_object returns the decoded $ANSIBLE_VAULT ciphertext STRING, which
      # we indent 2 spaces under the tag. The prior `wrap_object=true | to_nice_yaml`
      # path serialized the raw ciphertext BYTES as a Python repr (b'...\n...\n') — not
      # $ANSIBLE_VAULT-prefixed on read, so it decrypts to "Input is not vault encrypted
      # data". Verified round-trip: written value decrypts back via `ansible -m debug`.
      ansible.builtin.set_fact:
        openbao_vaulted_block: |-
          {% for item in openbao_export_items %}
          {{ item.key }}: !vault |
          {{ item.value | ansible.builtin.vault(openbao_vault_pw) | indent(2, true) }}
          {% endfor %}
      no_log: true

    - name: Write the exported secrets as inline !vault into secrets-openbao.yml
      ansible.builtin.blockinfile:
        path: "{{ openbao_secrets_file }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - OpenBao init secrets (auto-exported; do not edit)"
        block: "{{ openbao_vaulted_block }}"
        create: false
        insertafter: EOF
      delegate_to: localhost
      no_log: true

    - name: Report export result (counts only, no secret values)
      ansible.builtin.debug:
        msg: >-
          Exported {{ openbao_export_items | length }} OpenBao secret(s)
          (OPENBAO_ROOT_TOKEN + {{ (openbao_export_items | length) - 1 }} unseal share(s))
          as inline !vault into {{ openbao_secrets_file }}.
